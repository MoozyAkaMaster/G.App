  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ─── PALETTE & TOKENS ────────────────────────────────────────────
const C = {
  bg: "#13111a",
  surface: "#1e1b2e",
  card: "#252235",
  cardHover: "#2d2945",
  border: "#332f4a",
  mauve: "#c9b8e8",
  mauveLight: "#e2d8f5",
  mauvedim: "#9b87cc",
  teal: "#a8d8cc",
  tealDim: "#7ab8ac",
  rose: "#e8c4d8",
  roseDim: "#c49ab8",
  beige: "#f2e8d9",
  gold: "#d4b896",
  red: "#e88a8a",
  green: "#8adbc8",
  text: "#ede8f5",
  textDim: "#9490a8",
  textFaint: "#5c5870",
};

const MOODS = ["😔", "😕", "😐", "🙂", "😊", "😄", "🌟"];
const MOOD_LABELS = ["Très bas", "Bas", "Neutre", "Bien", "Super", "Excellent", "Rayonnante"];

// ─── STORAGE ─────────────────────────────────────────────────────
function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    if (STORAGE_KEYS.includes(key)) window.__cloudPush?.();
  }, [key, val]);
  return [val, setVal];
}

// Toutes les clés de données — utilisé pour la sauvegarde / synchro
const STORAGE_KEYS = [
  "life_tasks", "life_journal", "life_health", "life_projects",
  "life_notes", "life_courses", "life_dossiers", "life_budget", "life_vision",
  "life_weather_cities", "life_events",
];

// ═══════════════════════════════════════════════════════════════════
//  📅  ABONNEMENT CALENDRIER (.ics) — URL de base des Cloud Functions.
//  Laisse "" tant que la Cloud Function n'est PAS déployée : seul
//  l'export manuel .ics sera proposé (l'abonnement auto sera masqué).
//  Pour l'activer : déploie functions/index.js (voir ce fichier),
//  puis colle ici l'URL de base affichée par Firebase, par ex. :
//    "https://us-central1-gabos-3d3e8.cloudfunctions.net"
// ═══════════════════════════════════════════════════════════════════
const ICS_FEED_BASE = "";

// ═══════════════════════════════════════════════════════════════════
//  ⚙️  CONFIG FIREBASE — colle ici les clés de TON projet Firebase.
//  (Console Firebase > ⚙️ Paramètres du projet > "Vos applications" > Config)
//  Ces clés sont publiques par nature : la sécurité est assurée par les
//  règles Firestore (voir le fichier LISEZ-MOI-SYNC.txt).
//  Tant que ce bloc n'est pas rempli, l'app marche en local (sans login).
// ═══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAuYRezL2-BgDe0WNN5NI7ZLA23aOVNCIg",
  authDomain: "gabos-3d3e8.firebaseapp.com",
  projectId: "gabos-3d3e8",
  storageBucket: "gabos-3d3e8.firebasestorage.app",
  messagingSenderId: "776725038106",
  appId: "1:776725038106:web:1dc1f0c858092a3f7f3da3",
};

const CLOUD_ENABLED = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "À_REMPLACER";

// ─── Moteur de synchro cloud ─────────────────────────────────────
// Identifiant unique de CET appareil (pour ne pas réagir à ses propres écritures)
function getDeviceId() {
  let id = localStorage.getItem("gabos_device_id");
  if (!id) { id = Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem("gabos_device_id", id); }
  return id;
}

let _db = null, _auth = null, _pushTimer = null;

function initFirebase() {
  if (!CLOUD_ENABLED || typeof firebase === "undefined" || firebase.apps.length) return false;
  firebase.initializeApp(FIREBASE_CONFIG);
  _auth = firebase.auth();
  _db = firebase.firestore();
  return true;
}

function userDoc() {
  const u = _auth?.currentUser;
  if (!u) return null;
  return _db.collection("users").doc(u.uid);
}

// Lit toutes les données locales sous forme de map de chaînes JSON
function collectLocal() {
  const data = {};
  STORAGE_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v != null) data[k] = v; });
  return data;
}

// Y a-t-il déjà du contenu saisi sur cet appareil ?
function localHasContent() {
  const has = (k) => { try { const v = JSON.parse(localStorage.getItem(k) || "null"); return v && (Array.isArray(v) ? v.length : Object.keys(v).length); } catch { return false; } };
  return !!(has("life_tasks") || has("life_journal") || has("life_notes") || has("life_courses"));
}

// Envoie les données locales vers le cloud (débounce 1,5 s)
function cloudPush() {
  if (!CLOUD_ENABLED || !userDoc()) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(async () => {
    try {
      await userDoc().set({
        data: collectLocal(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: getDeviceId(),
      }, { merge: true });
      const snap = await userDoc().get();
      const at = snap.data()?.updatedAt?.toMillis?.() || Date.now();
      localStorage.setItem("gabos_applied_at", String(at));
    } catch (e) { /* hors-ligne : réessaiera au prochain changement */ }
  }, 1500);
}
window.__cloudPush = cloudPush;

// Envoi immédiat (attendable) — utilisé à la 1ʳᵉ connexion / résolution de conflit
async function cloudSyncNow() {
  if (!CLOUD_ENABLED || !userDoc()) return;
  await userDoc().set({
    data: collectLocal(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: getDeviceId(),
  }, { merge: true });
  const snap = await userDoc().get();
  const at = snap.data()?.updatedAt?.toMillis?.() || Date.now();
  localStorage.setItem("gabos_applied_at", String(at));
}

// Va chercher les données distantes si elles sont plus récentes (au retour sur l'app)
async function cloudPullIfNewer() {
  if (!CLOUD_ENABLED || !userDoc()) return;
  try {
    const snap = await userDoc().get();
    if (!snap.exists) return;
    const d = snap.data();
    const remoteAt = d.updatedAt?.toMillis?.() || 0;
    const appliedAt = +localStorage.getItem("gabos_applied_at") || 0;
    if (remoteAt > appliedAt && d.updatedBy !== getDeviceId()) applyRemote(d.data, remoteAt);
  } catch {}
}

// Applique des données distantes en local puis recharge l'app
function applyRemote(data, remoteAt) {
  STORAGE_KEYS.forEach(k => { if (data && data[k] != null) localStorage.setItem(k, data[k]); });
  if (remoteAt) localStorage.setItem("gabos_applied_at", String(remoteAt));
  location.reload();
}

// ─── HELPERS ─────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);
const fmt = (d) => new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
const isOverdue = (d) => d && d < today();

// ─── GLOBAL STYLES ───────────────────────────────────────────────
const GS = `
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:${C.bg};color:${C.text};font-family:'Inter',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:${C.border};border-radius:4px}
input,textarea,select{background:${C.surface};color:${C.text};border:1px solid ${C.border};border-radius:10px;padding:8px 12px;font-family:inherit;font-size:16px;outline:none;transition:.2s}
input:focus,textarea:focus,select:focus{border-color:${C.mauve};box-shadow:0 0 0 3px ${C.mauve}22}
input::placeholder,textarea::placeholder{color:${C.textFaint}}
button{cursor:pointer;font-family:inherit;transition:.15s}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.slide-in{animation:slideIn .25s ease}
.pop{animation:pop .2s ease}
`;

// ─── COMPONENTS ──────────────────────────────────────────────────
function Card({ children, style, className = "", onClick }) {
  return (
    <div className={`slide-in ${className}`} onClick={onClick} style={{
      background: C.card, borderRadius: 16, border: `1px solid ${C.border}`,
      padding: 20, ...style
    }}>{children}</div>
  );
}

function Badge({ color = C.mauve, children, small }) {
  return (
    <span style={{
      background: color + "22", color, borderRadius: 99, padding: small ? "2px 8px" : "4px 10px",
      fontSize: small ? 11 : 12, fontWeight: 600, whiteSpace: "nowrap"
    }}>{children}</span>
  );
}

function Btn({ children, onClick, color = C.mauve, outline, small, style, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: outline ? "transparent" : color + "22",
      color: outline ? C.textDim : color,
      border: `1px solid ${outline ? C.border : color + "44"}`,
      borderRadius: 10, padding: small ? "5px 12px" : "8px 18px",
      fontSize: small ? 12 : 13, fontWeight: 600,
      opacity: disabled ? .4 : 1,
      ...style
    }}>{children}</button>
  );
}

function Progress({ value, color = C.mauve, height = 6, style }) {
  return (
    <div style={{ background: C.border, borderRadius: 99, height, overflow: "hidden", ...style }}>
      <div style={{
        width: `${Math.min(100, Math.max(0, value))}%`, height: "100%",
        background: `linear-gradient(90deg, ${color}aa, ${color})`,
        borderRadius: 99, transition: "width .5s ease"
      }} />
    </div>
  );
}

function Checkbox({ checked, onChange, color = C.teal }) {
  return (
    <div onClick={onChange} style={{
      width: 22, height: 22, borderRadius: 6, border: `2px solid ${checked ? color : C.border}`,
      background: checked ? color + "33" : "transparent", cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center",
      transition: ".15s", flexShrink: 0
    }}>
      {checked && <span style={{ color, fontSize: 13 }}>✓</span>}
    </div>
  );
}

function SectionTitle({ children, color = C.mauve, action }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
      <h3 style={{ fontSize: 13, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 1 }}>{children}</h3>
      {action}
    </div>
  );
}

// ─── TAB: AUJOURD'HUI ────────────────────────────────────────────
function TodayTab({ tasks, setTasks, journal, setJournal, health, setHealth }) {
  const d = today();
  const [events] = useStorage("life_events", []);
  const todayEvents = eventsForDay(events, d);
  const todayJ = journal[d] || { mood: 3, note: "", proud: "", water: 0 };

  const updateJ = (k, v) => setJournal(j => ({ ...j, [d]: { ...todayJ, [k]: v } }));

  const priorities = tasks.filter(t => t.today && !t.done).slice(0, 3);
  const allActive = tasks.filter(t => !t.done && !t.today);

  const toggleToday = (id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, today: !t.today } : t));
  const toggleDone = (id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, done: !t.done, doneAt: today() } : t));

  const waterGoal = 8;
  const todayHealth = health[d] || { water: 0, sleep: "", matin: [], soir: [] };
  const upH = (k, v) => setHealth(h => ({ ...h, [d]: { ...todayHealth, [k]: v } }));

  const MATIN_ITEMS = ["Médoc matin", "Petit déj", "Soin visage", "5 min lecture"];
  const SOIR_ITEMS = ["Médoc soir", "Eau x8", "Soin soir", "Journal"];

  const greet = () => {
    const h = new Date().getHours();
    if (h < 12) return "Bonjour ☀️";
    if (h < 18) return "Bonne après-midi 🌤️";
    return "Bonsoir 🌙";
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16 }}>
      {/* Salutation */}
      <div style={{ gridColumn: "1/-1" }}>
        <Card style={{ background: `linear-gradient(135deg, ${C.mauve}18, ${C.teal}18)`, borderColor: C.mauve + "44" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "Playfair Display" }}>{greet()} Gab 🌸</div>
              <div style={{ color: C.textDim, fontSize: 13, marginTop: 4 }}>
                {new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" })}
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 32 }}>{MOODS[todayJ.mood]}</div>
              <div style={{ fontSize: 11, color: C.textDim }}>{MOOD_LABELS[todayJ.mood]}</div>
            </div>
          </div>
        </Card>
      </div>

      {/* Événements du jour */}
      <Card>
        <SectionTitle color={C.mauve} action={
          todayEvents.length > 0 && <Badge color={C.mauve} small>{todayEvents.length}</Badge>
        }>📅 Aujourd'hui</SectionTitle>
        {todayEvents.length === 0 ? (
          <div style={{ color: C.textFaint, fontSize: 13, textAlign: "center", padding: "20px 0" }}>
            Rien de prévu aujourd'hui 🌸
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {todayEvents.map(e => {
              const col = C[e.color] || C.mauve;
              return (
                <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 4, alignSelf: "stretch", minHeight: 26, borderRadius: 99, background: col, flexShrink: 0 }} />
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 12, color: C.textDim }}>{eventLineLabel(e)}</div>
                    <div style={{ fontSize: 14, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {/* Priorités du jour */}
      <Card>
        <SectionTitle color={C.gold} action={
          <Badge color={C.gold} small>{priorities.length}/3</Badge>
        }>⭐ Mes 3 Priorités</SectionTitle>
        {priorities.length === 0 && (
          <div style={{ color: C.textFaint, fontSize: 13, textAlign: "center", padding: "20px 0" }}>
            Choisis tes priorités dans l'onglet Tâches ✨
          </div>
        )}
        {priorities.map(t => (
          <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <Checkbox checked={t.done} onChange={() => toggleDone(t.id)} color={C.gold} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, color: t.done ? C.textFaint : C.text, textDecoration: t.done ? "line-through" : "none" }}>{t.title}</div>
              {t.due && <div style={{ fontSize: 11, color: isOverdue(t.due) ? C.red : C.textFaint }}>{fmt(t.due)}</div>}
            </div>
          </div>
        ))}
        {allActive.length > 0 && (
          <div style={{ marginTop: 12, borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 8 }}>Ajouter une priorité :</div>
            {allActive.slice(0, 5).map(t => (
              <div key={t.id} onClick={() => toggleToday(t.id)} style={{
                cursor: "pointer", padding: "5px 8px", borderRadius: 8,
                fontSize: 13, color: C.textDim, display: "flex", alignItems: "center", gap: 6
              }}>
                <span style={{ color: C.mauve }}>+</span> {t.title}
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Humeur */}
      <Card>
        <SectionTitle color={C.rose}>💗 Mon humeur</SectionTitle>
        <div style={{ fontSize: 40, textAlign: "center", marginBottom: 12 }}>{MOODS[todayJ.mood]}</div>
        <input type="range" min={0} max={6} value={todayJ.mood}
          onChange={e => updateJ("mood", +e.target.value)}
          style={{ width: "100%", accentColor: C.mauve, background: "transparent", marginBottom: 8 }} />
        <div style={{ textAlign: "center", color: C.mauve, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>
          {MOOD_LABELS[todayJ.mood]}
        </div>
        <textarea placeholder="Comment tu te sens aujourd'hui ?" value={todayJ.note}
          onChange={e => updateJ("note", e.target.value)}
          style={{ width: "100%", height: 60, resize: "none", fontSize: 13 }} />
        <textarea placeholder="🌟 Ce qui m'a rendue fière..." value={todayJ.proud}
          onChange={e => updateJ("proud", e.target.value)}
          style={{ width: "100%", height: 50, resize: "none", fontSize: 13, marginTop: 8 }} />
      </Card>

      {/* Santé - Eau */}
      <Card>
        <SectionTitle color={C.teal}>💧 Hydratation</SectionTitle>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 12 }}>
          {Array.from({ length: waterGoal }).map((_, i) => (
            <div key={i} onClick={() => upH("water", i < todayHealth.water ? i : i + 1)}
              style={{
                width: 36, height: 36, borderRadius: 8, cursor: "pointer",
                background: i < todayHealth.water ? C.teal + "44" : C.border,
                border: `2px solid ${i < todayHealth.water ? C.teal : C.border}`,
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18
              }}>💧</div>
          ))}
        </div>
        <div style={{ textAlign: "center", color: C.teal, fontSize: 13, fontWeight: 600 }}>
          {todayHealth.water}/{waterGoal} verres
        </div>
        <Progress value={(todayHealth.water / waterGoal) * 100} color={C.teal} style={{ marginTop: 10 }} />

        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 12, color: C.textDim, marginBottom: 6 }}>Sommeil (heures) :</div>
          <input type="number" min={0} max={12} step={0.5} value={todayHealth.sleep}
            onChange={e => upH("sleep", e.target.value)} style={{ width: "100%" }} placeholder="7.5" />
        </div>
      </Card>

      {/* Routines */}
      <Card>
        <SectionTitle color={C.rose}>🌅 Routines</SectionTitle>
        <div style={{ fontSize: 12, color: C.textDim, marginBottom: 8 }}>Matin :</div>
        {MATIN_ITEMS.map((item, i) => {
          const checked = (todayHealth.matin || []).includes(item);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <Checkbox checked={checked} color={C.gold}
                onChange={() => {
                  const arr = todayHealth.matin || [];
                  upH("matin", checked ? arr.filter(x => x !== item) : [...arr, item]);
                }} />
              <span style={{ fontSize: 13, color: checked ? C.textDim : C.text }}>{item}</span>
            </div>
          );
        })}
        <div style={{ fontSize: 12, color: C.textDim, margin: "10px 0 8px" }}>Soir :</div>
        {SOIR_ITEMS.map((item, i) => {
          const checked = (todayHealth.soir || []).includes(item);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <Checkbox checked={checked} color={C.teal}
                onChange={() => {
                  const arr = todayHealth.soir || [];
                  upH("soir", checked ? arr.filter(x => x !== item) : [...arr, item]);
                }} />
              <span style={{ fontSize: 13, color: checked ? C.textDim : C.text }}>{item}</span>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ─── TAB: TÂCHES ─────────────────────────────────────────────────
function TasksTab({ tasks, setTasks }) {
  const [newTitle, setNewTitle] = useState("");
  const [newDue, setNewDue] = useState("");
  const [newCat, setNewCat] = useState("perso");
  const [filter, setFilter] = useState("active");
  const [waiting, setWaiting] = useState(false);

  const CATS = { perso: { label: "Perso", color: C.mauve }, admin: { label: "Admin", color: C.gold }, sante: { label: "Santé", color: C.teal }, etudes: { label: "Études", color: C.rose } };

  const add = () => {
    if (!newTitle.trim()) return;
    setTasks(ts => [...ts, { id: uid(), title: newTitle, due: newDue, cat: newCat, done: false, today: false, waiting: waiting, subtasks: [], createdAt: today() }]);
    setNewTitle(""); setNewDue(""); setWaiting(false);
  };

  const del = (id) => setTasks(ts => ts.filter(t => t.id !== id));
  const toggleDone = (id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, done: !t.done, doneAt: today() } : t));
  const toggleToday = (id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, today: !t.today } : t));
  const addSub = (id, subTitle) => setTasks(ts => ts.map(t => t.id === id ? { ...t, subtasks: [...(t.subtasks || []), { id: uid(), title: subTitle, done: false }] } : t));
  const toggleSub = (tid, sid) => setTasks(ts => ts.map(t => t.id === tid ? { ...t, subtasks: t.subtasks.map(s => s.id === sid ? { ...s, done: !s.done } : s) } : t));

  const shown = tasks.filter(t =>
    filter === "active" ? !t.done && !t.waiting :
    filter === "today" ? t.today && !t.done :
    filter === "waiting" ? t.waiting && !t.done :
    filter === "done" ? t.done : true
  );

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16, alignItems: "start" }}>
      {/* Ajout */}
      <Card>
        <SectionTitle color={C.mauve}>➕ Nouvelle tâche</SectionTitle>
        <input placeholder="Titre de la tâche..." value={newTitle} onChange={e => setNewTitle(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()} style={{ width: "100%", marginBottom: 10 }} />
        <input type="date" value={newDue} onChange={e => setNewDue(e.target.value)} style={{ width: "100%", marginBottom: 10 }} />
        <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ width: "100%", marginBottom: 10 }}>
          {Object.entries(CATS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <label style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 13, color: C.textDim, cursor: "pointer", marginBottom: 12 }}>
          <input type="checkbox" checked={waiting} onChange={e => setWaiting(e.target.checked)} style={{ accentColor: C.gold, width: "auto" }} />
          En attente (quelqu'un d'autre)
        </label>
        <Btn onClick={add} style={{ width: "100%" }}>Ajouter ✨</Btn>

        {/* Stats */}
        <div style={{ marginTop: 20, borderTop: `1px solid ${C.border}`, paddingTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {Object.entries(CATS).map(([k, v]) => {
            const n = tasks.filter(t => t.cat === k && !t.done).length;
            return (
              <div key={k} style={{ background: C.surface, borderRadius: 10, padding: "8px 12px" }}>
                <div style={{ color: v.color, fontSize: 11, fontWeight: 700 }}>{v.label}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: C.text }}>{n}</div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Liste */}
      <div>
        {/* Filtres */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {[["active","Active"], ["today","Aujourd'hui"], ["waiting","En attente"], ["done","Terminées"]].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)} style={{
              padding: "6px 14px", borderRadius: 10, fontSize: 12, fontWeight: 600,
              background: filter === k ? C.mauve + "33" : "transparent",
              color: filter === k ? C.mauve : C.textDim,
              border: `1px solid ${filter === k ? C.mauve + "66" : C.border}`
            }}>{l} <span style={{ opacity: .6 }}>
              ({tasks.filter(t => k === "active" ? !t.done && !t.waiting : k === "today" ? t.today && !t.done : k === "waiting" ? t.waiting && !t.done : t.done).length})
            </span></button>
          ))}
        </div>

        {shown.length === 0 && (
          <Card><div style={{ textAlign: "center", color: C.textFaint, padding: "30px 0", fontSize: 14 }}>Aucune tâche ici 🌸</div></Card>
        )}

        {shown.map(task => (
          <TaskCard key={task.id} task={task} cats={CATS}
            onToggleDone={() => toggleDone(task.id)}
            onToggleToday={() => toggleToday(task.id)}
            onDelete={() => del(task.id)}
            onAddSub={(s) => addSub(task.id, s)}
            onToggleSub={(sid) => toggleSub(task.id, sid)}
          />
        ))}
      </div>
    </div>
  );
}

function TaskCard({ task, cats, onToggleDone, onToggleToday, onDelete, onAddSub, onToggleSub }) {
  const [expanded, setExpanded] = useState(false);
  const [subInput, setSubInput] = useState("");
  const cat = cats[task.cat] || cats.perso;

  return (
    <Card style={{ marginBottom: 10, borderColor: task.today ? C.gold + "44" : C.border }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
        <Checkbox checked={task.done} onChange={onToggleDone} color={cat.color} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 14, fontWeight: 500, textDecoration: task.done ? "line-through" : "none", color: task.done ? C.textFaint : C.text }}>
              {task.title}
            </span>
            <Badge color={cat.color} small>{cat.label}</Badge>
            {task.waiting && <Badge color={C.gold} small>⏳ Attente</Badge>}
            {task.due && <Badge color={isOverdue(task.due) && !task.done ? C.red : C.textFaint} small>{fmt(task.due)}</Badge>}
            {task.today && !task.done && <Badge color={C.gold} small>⭐ Priorité</Badge>}
          </div>
          {task.subtasks?.length > 0 && (
            <Progress value={task.subtasks.filter(s => s.done).length / task.subtasks.length * 100}
              color={cat.color} style={{ marginTop: 8, width: 100 }} height={4} />
          )}
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setExpanded(!expanded)} style={{
            background: "transparent", border: "none", color: C.textDim, fontSize: 14, padding: "2px 6px"
          }}>{expanded ? "▲" : "▼"}</button>
          <button onClick={onToggleToday} style={{
            background: task.today ? C.gold + "22" : "transparent",
            border: `1px solid ${task.today ? C.gold : C.border}`,
            color: task.today ? C.gold : C.textDim, borderRadius: 6, fontSize: 12, padding: "2px 6px"
          }}>⭐</button>
          <button onClick={onDelete} style={{ background: "transparent", border: "none", color: C.textFaint, padding: "2px 6px" }}>✕</button>
        </div>
      </div>

      {expanded && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
          {task.subtasks?.map(s => (
            <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <Checkbox checked={s.done} onChange={() => onToggleSub(s.id)} color={cat.color} />
              <span style={{ fontSize: 13, color: s.done ? C.textFaint : C.text, textDecoration: s.done ? "line-through" : "none" }}>{s.title}</span>
            </div>
          ))}
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <input placeholder="Ajouter une sous-tâche..." value={subInput}
              onChange={e => setSubInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && subInput.trim()) { onAddSub(subInput); setSubInput(""); } }}
              style={{ flex: 1, fontSize: 12 }} />
            <Btn small onClick={() => { if (subInput.trim()) { onAddSub(subInput); setSubInput(""); } }}>+</Btn>
          </div>
        </div>
      )}
    </Card>
  );
}

// ─── TAB: FOCUS (POMODORO) ───────────────────────────────────────
function FocusTab({ tasks }) {
  const [mode, setMode] = useState("work");
  const DURATIONS = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
  const [timeLeft, setTimeLeft] = useState(DURATIONS.work);
  const [running, setRunning] = useState(false);
  const [sessions, setSessions] = useState(0);
  const [selectedTask, setSelectedTask] = useState(null);
  const [logs, setLogs] = useState([]);
  const intervalRef = useRef(null);

  useEffect(() => {
    setTimeLeft(DURATIONS[mode]);
    setRunning(false);
  }, [mode]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            if (mode === "work") {
              setSessions(s => s + 1);
              setLogs(l => [...l, { task: selectedTask, time: new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }) }]);
            }
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, mode]);

  const reset = () => { setTimeLeft(DURATIONS[mode]); setRunning(false); };
  const mm = String(Math.floor(timeLeft / 60)).padStart(2, "0");
  const ss = String(timeLeft % 60).padStart(2, "0");
  const progress = ((DURATIONS[mode] - timeLeft) / DURATIONS[mode]) * 100;

  const radius = 80;
  const circ = 2 * Math.PI * radius;

  const activeTasks = tasks.filter(t => !t.done);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16, alignItems: "start" }}>
      {/* Timer */}
      <Card style={{ textAlign: "center" }}>
        <SectionTitle color={C.rose}>🍅 Pomodoro Focus</SectionTitle>

        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 24, flexWrap: "wrap" }}>
          {[["work","Travail 25min"], ["short","Pause 5min"], ["long","Longue 15min"]].map(([k,l]) => (
            <button key={k} onClick={() => setMode(k)} style={{
              padding: "6px 12px", borderRadius: 10, fontSize: 11, fontWeight: 600,
              background: mode === k ? C.rose + "33" : "transparent",
              color: mode === k ? C.rose : C.textDim,
              border: `1px solid ${mode === k ? C.rose + "66" : C.border}`
            }}>{l}</button>
          ))}
        </div>

        <div style={{ position: "relative", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 24 }}>
          <svg width={200} height={200} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={100} cy={100} r={radius} fill="none" stroke={C.border} strokeWidth={8} />
            <circle cx={100} cy={100} r={radius} fill="none"
              stroke={mode === "work" ? C.rose : C.teal}
              strokeWidth={8} strokeLinecap="round"
              strokeDasharray={circ}
              strokeDashoffset={circ * (1 - progress / 100)}
              style={{ transition: "stroke-dashoffset .5s ease" }} />
          </svg>
          <div style={{ position: "absolute", textAlign: "center" }}>
            <div style={{ fontSize: 36, fontWeight: 700, fontFamily: "Playfair Display" }}>{mm}:{ss}</div>
            <div style={{ fontSize: 12, color: C.textDim }}>{mode === "work" ? "Focus" : "Pause"}</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 24 }}>
          <Btn onClick={reset} outline>↺ Reset</Btn>
          <button onClick={() => setRunning(!running)} style={{
            padding: "10px 32px", borderRadius: 12, fontSize: 15, fontWeight: 700,
            background: running ? C.red + "33" : `linear-gradient(135deg, ${C.rose}44, ${C.mauve}44)`,
            color: running ? C.red : C.rose, border: `1px solid ${running ? C.red + "66" : C.rose + "66"}`
          }}>{running ? "⏸ Pause" : "▶ Démarrer"}</button>
        </div>

        <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap" }}>
          {Array.from({ length: Math.max(sessions, 4) }).map((_, i) => (
            <div key={i} style={{
              width: 14, height: 14, borderRadius: "50%",
              background: i < sessions ? C.rose : C.border,
              border: `2px solid ${i < sessions ? C.rose : C.border}`
            }} />
          ))}
          <span style={{ fontSize: 12, color: C.textDim, marginLeft: 8 }}>{sessions} session{sessions > 1 ? "s" : ""}</span>
        </div>
      </Card>

      {/* Tâche en cours */}
      <Card>
        <SectionTitle color={C.mauve}>🎯 Tâche en cours</SectionTitle>
        {activeTasks.length === 0 ? (
          <div style={{ color: C.textFaint, fontSize: 13 }}>Aucune tâche active</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {activeTasks.slice(0, 6).map(t => (
              <div key={t.id} onClick={() => setSelectedTask(t.title)} style={{
                padding: "8px 12px", borderRadius: 10, cursor: "pointer",
                background: selectedTask === t.title ? C.mauve + "22" : C.surface,
                border: `1px solid ${selectedTask === t.title ? C.mauve + "66" : "transparent"}`,
                fontSize: 13, color: selectedTask === t.title ? C.mauve : C.text
              }}>{t.title}</div>
            ))}
          </div>
        )}
        {selectedTask && (
          <div style={{ marginTop: 12, padding: "8px 12px", background: C.mauve + "11", borderRadius: 10, fontSize: 13, color: C.mauve }}>
            🎯 Focus sur : <strong>{selectedTask}</strong>
          </div>
        )}

        <div style={{ marginTop: 16, borderTop: `1px solid ${C.border}`, paddingTop: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.teal, marginBottom: 10 }}>📋 Sessions du jour</div>
          {logs.length === 0 ? (
            <div style={{ color: C.textFaint, fontSize: 13 }}>Lance ton premier Pomodoro ! 🍅</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {logs.slice(-6).map((l, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ color: C.text }}>🍅 {l.task || "Sans tâche"}</span>
                  <span style={{ color: C.textDim }}>{l.time}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}

function ObjectifsTab() {
  const [projects, setProjects] = useStorage("life_projects", [
    { id: uid(), title: "Bac Pro MCV", color: C.mauve, progress: 40, deadline: "2026-06-30", notes: "", steps: [{ id: uid(), title: "Révisions maths", done: false }, { id: uid(), title: "Dossier PPE", done: true }] },
    { id: uid(), title: "Vanille & Droit", color: C.teal, progress: 20, deadline: "2027-01-01", notes: "", steps: [] },
    { id: uid(), title: "Dossier MDPH", color: C.gold, progress: 60, deadline: "2026-07-15", notes: "", steps: [] },
  ]);
  const [selected, setSelected] = useState(null);
  const [newTitle, setNewTitle] = useState("");

  const addProject = () => {
    if (!newTitle.trim()) return;
    setProjects(p => [...p, { id: uid(), title: newTitle, color: C.mauve, progress: 0, deadline: "", notes: "", steps: [] }]);
    setNewTitle("");
  };

  const updateP = (id, changes) => setProjects(ps => ps.map(p => p.id === id ? { ...p, ...changes } : p));
  const addStep = (id, title) => updateP(id, { steps: [...(projects.find(p => p.id === id)?.steps || []), { id: uid(), title, done: false }] });
  const toggleStep = (pid, sid) => {
    const p = projects.find(x => x.id === pid);
    updateP(pid, { steps: p.steps.map(s => s.id === sid ? { ...s, done: !s.done } : s) });
  };

  const sel = projects.find(p => p.id === selected);

  return (
    <div style={{ display: "grid", gridTemplateColumns: sel ? "repeat(auto-fit, minmax(280px, 1fr))" : "1fr", gap: 16 }}>
      <div>
        <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
          <input placeholder="Nouveau projet..." value={newTitle} onChange={e => setNewTitle(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addProject()} style={{ flex: 1 }} />
          <Btn onClick={addProject}>+</Btn>
        </div>

        {projects.map(p => {
          const done = (p.steps.filter(s => s.done).length / Math.max(1, p.steps.length)) * 100;
          const prog = p.steps.length > 0 ? done : p.progress;
          return (
            <Card key={p.id} style={{ marginBottom: 12, cursor: "pointer", borderColor: selected === p.id ? p.color + "66" : C.border }}
              onClick={() => setSelected(selected === p.id ? null : p.id)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{p.title}</div>
                  {p.deadline && <div style={{ fontSize: 11, color: C.textDim, marginTop: 2 }}>📅 {fmt(p.deadline)}</div>}
                </div>
                <div style={{ fontSize: 20, fontWeight: 700, color: p.color }}>{Math.round(prog)}%</div>
              </div>
              <Progress value={prog} color={p.color} />
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <Badge color={p.color} small>{p.steps.filter(s => s.done).length}/{p.steps.length} étapes</Badge>
              </div>
            </Card>
          );
        })}
      </div>

      {sel && (
        <Card style={{ borderColor: sel.color + "44" }}>
          <SectionTitle color={sel.color}>🎯 {sel.title}</SectionTitle>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: C.textDim, marginBottom: 6 }}>Progression manuelle :</div>
            <input type="range" min={0} max={100} value={sel.progress}
              onChange={e => updateP(sel.id, { progress: +e.target.value })}
              style={{ width: "100%", accentColor: sel.color }} />
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <input type="date" value={sel.deadline} onChange={e => updateP(sel.id, { deadline: e.target.value })} style={{ flex: 1 }} />
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: C.textDim, marginBottom: 8 }}>Étapes :</div>
            {sel.steps.map(s => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <Checkbox checked={s.done} onChange={() => toggleStep(sel.id, s.id)} color={sel.color} />
                <span style={{ fontSize: 13, textDecoration: s.done ? "line-through" : "none", color: s.done ? C.textFaint : C.text }}>{s.title}</span>
              </div>
            ))}
            <StepAdder onAdd={(t) => addStep(sel.id, t)} color={sel.color} />
          </div>

          <div>
            <div style={{ fontSize: 12, color: C.textDim, marginBottom: 6 }}>Notes :</div>
            <textarea value={sel.notes} onChange={e => updateP(sel.id, { notes: e.target.value })}
              style={{ width: "100%", height: 80, resize: "none", fontSize: 13 }} placeholder="Notes, idées, liens..." />
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <Btn outline small onClick={() => setProjects(ps => ps.filter(p => p.id !== sel.id))}>🗑 Supprimer</Btn>
          </div>
        </Card>
      )}
    </div>
  );
}

// ─── MONTANTS (budget) : virgule OU point, clavier décimal ───────
// Renvoie toujours un float (0 si invalide). Accepte nombre ou chaîne.
function parseAmount(str) {
  if (typeof str === "number") return isFinite(str) ? str : 0;
  if (!str) return 0;
  let v = String(str).replace(/\s/g, "").replace(",", ".").replace(/[^0-9.]/g, "");
  const parts = v.split(".");
  if (parts.length > 1) v = parts[0] + "." + parts.slice(1).join("");
  const n = parseFloat(v);
  return isFinite(n) ? n : 0;
}

// Affiche un montant avec la virgule française
function formatAmount(n) {
  const v = parseAmount(n);
  return (Number.isInteger(v) ? String(v) : v.toFixed(2)).replace(".", ",");
}

// Champ de saisie de montant réutilisable (texte + clavier décimal)
function AmountInput({ value, onChange, placeholder = "€", style }) {
  const handle = (e) => {
    let v = e.target.value.replace(/[^0-9.,]/g, "");          // chiffres + séparateurs
    const i = v.search(/[.,]/);
    if (i !== -1) v = v.slice(0, i + 1) + v.slice(i + 1).replace(/[.,]/g, ""); // un seul séparateur
    onChange(v);
  };
  return (
    <input
      type="text" inputMode="decimal" placeholder={placeholder}
      value={value == null ? "" : String(value).replace(".", ",")}
      onChange={handle}
      onFocus={e => { if (!value || parseAmount(value) === 0) e.target.select(); }}
      style={style}
    />
  );
}

// ─── CYCLE BUDGÉTAIRE & ÉCHÉANCES ────────────────────────────────
const MOIS_FR = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
const pad2 = (n) => String(n).padStart(2, "0");

// Début du cycle en cours selon le jour de paie (1-28) et la date du jour
function getCurrentCycleStart(day) {
  const d = Math.min(Math.max(parseInt(day) || 1, 1), 28);
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  if (now.getDate() < d) { m -= 1; if (m < 0) { m = 11; y -= 1; } }
  return `${y}-${pad2(m + 1)}-${pad2(d)}`;
}
// Jour précédant une date ISO (pour la fin du cycle archivé)
function dayBefore(iso) {
  const dt = new Date(iso + "T12:00:00");
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
}
// Fin du cycle courant = veille du même jour le mois suivant
function cycleEndFromStart(iso) {
  const dt = new Date(iso + "T12:00:00");
  dt.setMonth(dt.getMonth() + 1);
  dt.setDate(dt.getDate() - 1);
  return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`;
}
const fmtJourMois = (iso) => iso ? new Date(iso + "T12:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "long" }) : "";

// Texte d'échéance d'une dépense récurrente
function fmtEcheance(d) {
  const f = d.frequence || "ponctuel";
  if (f === "mensuel" && d.jourEcheance) return `le ${d.jourEcheance} de chaque mois`;
  if (f === "annuel" && d.jourEcheance && d.moisEcheance) return `le ${d.jourEcheance} ${MOIS_FR[d.moisEcheance - 1]}`;
  return "";
}

// ─── SAUVEGARDE / RESTAURATION ───────────────────────────────────
function SaveView() {
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);

  const exportData = () => {
    const data = {};
    STORAGE_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v != null) data[k] = v;
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `gabos-sauvegarde-${today()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setMsg("✅ Sauvegarde téléchargée !");
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        Object.entries(data).forEach(([k, v]) => {
          if (STORAGE_KEYS.includes(k)) localStorage.setItem(k, v);
        });
        setMsg("✅ Données restaurées ! Rechargement...");
        setTimeout(() => location.reload(), 800);
      } catch {
        setMsg("❌ Fichier invalide.");
      }
    };
    reader.readAsText(file);
  };

  return (
    <Card>
      <SectionTitle color={C.gold}>💾 Sauvegarde & Restauration</SectionTitle>
      <p style={{ fontSize: 13, color: C.textDim, lineHeight: 1.6, marginBottom: 16 }}>
        Tes données restent sur ton téléphone. Pour éviter toute perte (changement de
        téléphone, nettoyage de Safari...), pense à <strong style={{ color: C.text }}>exporter
        une sauvegarde de temps en temps</strong>. Tu pourras la réimporter à tout moment.
      </p>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Btn color={C.teal} onClick={exportData} style={{ width: "100%" }}>
          ⬇️ Exporter mes données (.json)
        </Btn>
        <Btn color={C.mauve} outline onClick={() => fileRef.current?.click()} style={{ width: "100%" }}>
          ⬆️ Importer une sauvegarde
        </Btn>
        <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }}
          onChange={e => { if (e.target.files[0]) importData(e.target.files[0]); }} />
      </div>

      {msg && (
        <div style={{ marginTop: 14, padding: "8px 12px", background: C.surface, borderRadius: 10, fontSize: 13, color: C.text }}>
          {msg}
        </div>
      )}

      <div style={{ marginTop: 20, borderTop: `1px solid ${C.border}`, paddingTop: 16, fontSize: 12, color: C.textFaint, lineHeight: 1.6 }}>
        💡 Astuce : envoie-toi le fichier de sauvegarde par mail ou enregistre-le dans
        « Fichiers » / iCloud pour le garder en sécurité.
      </div>
    </Card>
  );
}

// ─── HELPERS CALENDRIER / ÉVÉNEMENTS ─────────────────────────────
const DAY_MS = 86400000;
// Date -> "YYYY-MM-DD" (en heure locale)
const ymd = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
// "YYYY-MM-DD" -> Date (midi local, pour éviter les décalages de fuseau)
const parseYMD = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d, 12, 0, 0, 0); };
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
// Lundi de la semaine contenant `d`
const startOfWeek = (d) => { const x = new Date(d); const wd = (x.getDay() + 6) % 7; x.setDate(x.getDate() - wd); x.setHours(12, 0, 0, 0); return x; };

// "HH:MM" -> minutes depuis minuit (ou null)
const timeToMin = (t) => { if (!t) return null; const [h, m] = t.split(":").map(Number); return h * 60 + (m || 0); };
// minutes -> "HH:MM"
const minToTime = (mins) => `${String(Math.floor(mins / 60)).padStart(2, "0")}:${String(mins % 60).padStart(2, "0")}`;
// "09:00" -> "9h", "09:30" -> "9h30"
const fmtHeure = (t) => { if (!t) return ""; const [h, m] = t.split(":"); return m === "00" ? `${parseInt(h)}h` : `${parseInt(h)}h${m}`; };

// L'événement `ev` a-t-il une occurrence le jour `dateStr` ("YYYY-MM-DD") ?
// Gère la récurrence (none/daily/weekly/monthly) sans stocker chaque occurrence.
function eventOccursOn(ev, dateStr) {
  const base = ev.date;
  if (!base || dateStr < base) return false;
  if (ev.recurrenceEnd && dateStr > ev.recurrenceEnd) return false;
  const rec = ev.recurrence || "none";
  if (rec === "none") return dateStr === base;
  if (rec === "daily") return true;
  const bd = parseYMD(base), dd = parseYMD(dateStr);
  if (rec === "weekly") return Math.round((dd - bd) / DAY_MS) % 7 === 0;
  if (rec === "monthly") return bd.getDate() === dd.getDate();
  return dateStr === base;
}

// Tous les événements (occurrences incluses) qui tombent le jour `dateStr`,
// triés : « toute la journée » d'abord, puis par heure de début.
function eventsForDay(events, dateStr) {
  return events
    .filter(e => eventOccursOn(e, dateStr))
    .sort((a, b) => {
      const am = timeToMin(a.startTime), bm = timeToMin(b.startTime);
      if (am == null && bm == null) return 0;
      if (am == null) return -1;
      if (bm == null) return 1;
      return am - bm;
    });
}

// Texte « 11h-13h — Dentiste » / « 11h — … » / « Toute la journée — … »
function eventLineLabel(ev) {
  if (!ev.startTime) return "Toute la journée";
  if (ev.endTime) return `${fmtHeure(ev.startTime)}-${fmtHeure(ev.endTime)}`;
  return fmtHeure(ev.startTime);
}

// ─── GÉNÉRATION iCalendar (.ics) — RFC 5545 ──────────────────────
function icsEscape(s) {
  return String(s == null ? "" : s)
    .replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
}
// "YYYY-MM-DD" -> "YYYYMMDD"
const icsDate = (dateStr) => dateStr.replace(/-/g, "");
// "YYYY-MM-DD" + "HH:MM" -> "YYYYMMDDTHHMMSS" (heure locale « flottante »)
const icsDateTime = (dateStr, timeStr) => icsDate(dateStr) + "T" + (timeStr || "00:00").replace(":", "") + "00";

function icsRRule(ev) {
  const map = { daily: "DAILY", weekly: "WEEKLY", monthly: "MONTHLY" };
  const freq = map[ev.recurrence];
  if (!freq) return "";
  let r = "RRULE:FREQ=" + freq;
  if (ev.recurrenceEnd) r += ";UNTIL=" + icsDate(ev.recurrenceEnd) + "T235959Z";
  return r;
}

function eventToVEVENT(ev) {
  const lines = ["BEGIN:VEVENT"];
  lines.push("UID:" + (ev.id || uid()) + "@gabos");
  lines.push("DTSTAMP:" + icsDateTime(ev.date, "12:00") + "Z");
  if (ev.startTime) {
    lines.push("DTSTART:" + icsDateTime(ev.date, ev.startTime));
    if (ev.endTime) lines.push("DTEND:" + icsDateTime(ev.date, ev.endTime));
  } else {
    // Événement « toute la journée » : DTEND = jour suivant (exclusif)
    lines.push("DTSTART;VALUE=DATE:" + icsDate(ev.date));
    lines.push("DTEND;VALUE=DATE:" + icsDate(ymd(addDays(parseYMD(ev.date), 1))));
  }
  const rrule = icsRRule(ev);
  if (rrule) lines.push(rrule);
  lines.push("SUMMARY:" + icsEscape(ev.title || "Sans titre"));
  if (ev.location) lines.push("LOCATION:" + icsEscape(ev.location));
  const desc = [ev.notes, ev.email && ("Email : " + ev.email), ev.phone && ("Tél : " + ev.phone)].filter(Boolean).join("\n");
  if (desc) lines.push("DESCRIPTION:" + icsEscape(desc));
  lines.push("END:VEVENT");
  return lines.join("\r\n");
}

function buildICS(events) {
  return [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//GabOS//Calendrier//FR",
    "CALSCALE:GREGORIAN", "METHOD:PUBLISH", "X-WR-CALNAME:GabOS",
    ...events.filter(e => e.date).map(eventToVEVENT),
    "END:VCALENDAR",
  ].join("\r\n");
}

function downloadICS(events) {
  const blob = new Blob([buildICS(events)], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gabos-calendrier-${today()}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── FORMULAIRE ÉVÉNEMENT (ajout / édition) ──────────────────────
function EventForm({ initial, onSave, onDelete, onClose }) {
  const [f, setF] = useState(initial);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const allDay = !f.startTime;

  const toggleAllDay = (checked) => {
    if (checked) setF(p => ({ ...p, startTime: null, endTime: null }));
    else setF(p => ({ ...p, startTime: "09:00", endTime: "10:00" }));
  };

  const submit = () => {
    if (!f.title.trim() || !f.date) return;
    onSave({ ...f, title: f.title.trim() });
  };

  const label = { fontSize: 12, color: C.textDim, marginBottom: 4, display: "block" };

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "#0008", zIndex: 200,
      display: "flex", alignItems: "flex-start", justifyContent: "center",
      padding: 16, overflowY: "auto"
    }}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 420, marginTop: 24, marginBottom: 24 }}>
        <Card>
          <SectionTitle color={C[f.color] || C.mauve}>
            {f.id ? "✏️ Modifier l'événement" : "➕ Nouvel événement"}
          </SectionTitle>

          <label style={label}>Titre</label>
          <input placeholder="Ex: Rendez-vous dentiste" value={f.title}
            onChange={e => set("title", e.target.value)} style={{ width: "100%", marginBottom: 12 }} />

          <label style={label}>Date</label>
          <input type="date" value={f.date} onChange={e => set("date", e.target.value)}
            style={{ width: "100%", marginBottom: 12 }} />

          <label style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 13, color: C.textDim, cursor: "pointer", marginBottom: 12 }}>
            <input type="checkbox" checked={allDay} onChange={e => toggleAllDay(e.target.checked)}
              style={{ accentColor: C.mauve, width: "auto" }} />
            Toute la journée
          </label>

          {!allDay && (
            <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
              <div style={{ flex: 1 }}>
                <label style={label}>Début</label>
                <input type="time" value={f.startTime || ""} onChange={e => set("startTime", e.target.value || null)} style={{ width: "100%" }} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={label}>Fin (optionnel)</label>
                <input type="time" value={f.endTime || ""} onChange={e => set("endTime", e.target.value || null)} style={{ width: "100%" }} />
              </div>
            </div>
          )}

          <label style={label}>Récurrence</label>
          <select value={f.recurrence} onChange={e => set("recurrence", e.target.value)} style={{ width: "100%", marginBottom: 12 }}>
            <option value="none">Aucune</option>
            <option value="daily">Tous les jours</option>
            <option value="weekly">Toutes les semaines</option>
            <option value="monthly">Tous les mois</option>
          </select>

          {f.recurrence !== "none" && (
            <div style={{ marginBottom: 12 }}>
              <label style={label}>Jusqu'au (optionnel)</label>
              <input type="date" value={f.recurrenceEnd || ""} onChange={e => set("recurrenceEnd", e.target.value || null)} style={{ width: "100%" }} />
            </div>
          )}

          <label style={label}>Lieu</label>
          <input placeholder="Adresse, salle..." value={f.location || ""}
            onChange={e => set("location", e.target.value)} style={{ width: "100%", marginBottom: 12 }} />

          <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
            <div style={{ flex: 1 }}>
              <label style={label}>Email</label>
              <input type="email" inputMode="email" placeholder="@" value={f.email || ""}
                onChange={e => set("email", e.target.value)} style={{ width: "100%" }} />
            </div>

              <label style={label}>Téléphone</label>
              <input type="tel" inputMode="tel" placeholder="06…" value={f.phone || ""}
                onChange={e => set("phone", e.target.value)} style={{ width: "100%" }} />

              <div key={c} onClick={() => set("color", c)} style={{

// Affiché uniquement si Firebase + Cloud Function configurés. Génère/lit un
// token aléatoire stocké dans le profil utilisateur Firestore (champ icsToken).
function IcsSubscription({ user }) {
  const [token, setToken] = useState(null);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    let active = true;
    (async () => {
      try {
        const ref = userDoc();
        if (!ref) return;
        const snap = await ref.get();
        let t = snap.exists && snap.data().icsToken;
        if (!t) { t = uid() + uid() + uid(); await ref.set({ icsToken: t }, { merge: true }); }
        if (active) setToken(t);
      } catch {}
    })();
    return () => { active = false; };
  }, []);

  const url = token ? `${ICS_FEED_BASE}/icsFeed?token=${token}` : "";
  const copy = () => {
    if (!url) return;
    navigator.clipboard?.writeText(url).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1800); });
  };

  return (
    <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.border}` }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.mauve, marginBottom: 8 }}>♾️ Abonnement automatique</div>
      {!token ? (
        <div style={{ fontSize: 12, color: C.textFaint }}>Préparation du lien…</div>
      ) : (
        <div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
            <input readOnly value={url} onFocus={e => e.target.select()} style={{ flex: 1, fontSize: 11 }} />
            <Btn color={C.mauve} small onClick={copy}>{copied ? "✓ Copié" : "Copier"}</Btn>
          </div>
          <div style={{ fontSize: 12, color: C.textDim, lineHeight: 1.6 }}>
            <strong style={{ color: C.text }}>Sur iPhone/Mac :</strong> Réglages &gt; Calendrier &gt; Comptes &gt; Ajouter un compte &gt; Autre &gt; Compte calendrier S'abonner.<br />
            <strong style={{ color: C.text }}>Sur Google Calendar :</strong> Autres agendas &gt; À partir de l'URL.
          </div>
          <div style={{ fontSize: 11, color: C.gold, marginTop: 10, background: C.gold + "18", borderRadius: 8, padding: "8px 10px" }}>
            ⚠️ Abonnement en lecture seule : les modifications faites depuis Apple/Google Calendar ne reviendront pas dans GabOS.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TAB: CALENDRIER ─────────────────────────────────────────────
function CalendarTab({ user }) {
  const [events, setEvents] = useStorage("life_events", []);
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [editing, setEditing] = useState(null);
  const gridRef = useRef(null);

  const HOUR_H = 44;           // hauteur d'une heure de grille (px)
  const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
  const todayStr = today();

  // Au montage : centrer la vue vers 7h du matin
  useEffect(() => { if (gridRef.current) gridRef.current.scrollTop = 7 * HOUR_H; }, []);

  const openNew = (dateStr, startTime) => setEditing({
    id: null, title: "", date: dateStr,
    startTime: startTime || null,
    endTime: startTime ? minToTime(Math.min(timeToMin(startTime) + 60, 23 * 60 + 59)) : null,
    recurrence: "none", recurrenceEnd: null,
    location: "", email: "", phone: "", notes: "", color: "mauve",
  });

  const save = (ev) => {
    setEvents(list => ev.id ? list.map(e => e.id === ev.id ? ev : e) : [...list, { ...ev, id: uid() }]);
    setEditing(null);
  };
  const remove = (id) => { setEvents(list => list.filter(e => e.id !== id)); setEditing(null); };

  // Clic sur une colonne-jour vide -> ajout avec heure pré-remplie (arrondi 30 min)
  const onColumnClick = (dateStr, e) => {
    const y = e.nativeEvent.offsetY;
    let mins = Math.round((y / HOUR_H) * 2) / 2 * 60;
    mins = Math.max(0, Math.min(23 * 60 + 30, Math.round(mins / 30) * 30));
    openNew(dateStr, minToTime(mins));
  };

  const weekLabel = () => {
    const a = days[0], b = days[6];
    const optA = { day: "numeric", month: a.getMonth() === b.getMonth() ? undefined : "short" };
    return `${a.toLocaleDateString("fr-FR", optA)} – ${b.toLocaleDateString("fr-FR", { day: "numeric", month: "short" })}`;
  };

  return (
    <div>
      {/* Barre de navigation semaine */}
      <Card style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Btn small outline onClick={() => setWeekStart(w => addDays(w, -7))}>‹</Btn>
            <Btn small outline onClick={() => setWeekStart(startOfWeek(new Date()))}>Aujourd'hui</Btn>
            <Btn small outline onClick={() => setWeekStart(w => addDays(w, 7))}>›</Btn>
            <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "Playfair Display", marginLeft: 6 }}>{weekLabel()}</span>
          </div>
          <Btn color={C.mauve} onClick={() => openNew(todayStr, "09:00")}>+ Événement</Btn>
        </div>
      </Card>

      {/* Vue semaine */}
      <Card style={{ padding: 0, overflow: "hidden" }}>
        {/* En-têtes des jours */}
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}` }}>
          <div style={{ width: 44, flexShrink: 0 }} />
          {days.map(d => {
            const isToday = ymd(d) === todayStr;
            return (
              <div key={ymd(d)} style={{ flex: 1, textAlign: "center", padding: "8px 2px", minWidth: 0 }}>
                <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase" }}>
                  {d.toLocaleDateString("fr-FR", { weekday: "short" }).replace(".", "")}
                </div>
                <div style={{
                  fontSize: 15, fontWeight: 700, marginTop: 2,
                  color: isToday ? C.bg : C.text,
                  background: isToday ? C.mauve : "transparent",
                  borderRadius: 99, width: 26, height: 26, lineHeight: "26px", margin: "2px auto 0"
                }}>{d.getDate()}</div>
              </div>
            );
          })}
        </div>

        {/* Bandeau « toute la journée » */}
        <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, minHeight: 26 }}>
          <div style={{ width: 44, flexShrink: 0, fontSize: 9, color: C.textFaint, textAlign: "center", paddingTop: 6 }}>jour</div>
          {days.map(d => {
            const ds = ymd(d);
            const allDay = eventsForDay(events, ds).filter(e => !e.startTime);
            return (
              <div key={ds} style={{ flex: 1, minWidth: 0, borderLeft: `1px solid ${C.border}`, padding: 3, display: "flex", flexDirection: "column", gap: 3 }}>
                {allDay.map(e => (
                  <div key={e.id} onClick={() => setEditing(e)} style={{
                    background: (C[e.color] || C.mauve) + "33", color: C[e.color] || C.mauve,
                    borderLeft: `3px solid ${C[e.color] || C.mauve}`, borderRadius: 5,
                    fontSize: 10, padding: "2px 5px", cursor: "pointer",
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                  }}>{e.title}</div>
                ))}
              </div>
            );
          })}
        </div>

        {/* Grille horaire */}
        <div ref={gridRef} style={{ display: "flex", maxHeight: 560, overflowY: "auto", position: "relative" }}>
          {/* Colonne des heures */}
          <div style={{ width: 44, flexShrink: 0 }}>
            {Array.from({ length: 24 }).map((_, h) => (
              <div key={h} style={{ height: HOUR_H, fontSize: 10, color: C.textFaint, textAlign: "right", paddingRight: 5, transform: "translateY(-6px)" }}>
                {h === 0 ? "" : `${h}h`}
              </div>
            ))}
          </div>

          {/* Colonnes des jours */}
          {days.map(d => {
            const ds = ymd(d);
            const timed = eventsForDay(events, ds).filter(e => e.startTime);
            return (
              <div key={ds} onClick={(e) => onColumnClick(ds, e)} style={{
                flex: 1, minWidth: 0, position: "relative", height: 24 * HOUR_H,
                borderLeft: `1px solid ${C.border}`, cursor: "pointer"
              }}>
                {/* Lignes de grille */}
                {Array.from({ length: 24 }).map((_, h) => (
                  <div key={h} style={{ position: "absolute", top: h * HOUR_H, left: 0, right: 0, height: HOUR_H, borderTop: `1px solid ${C.border}55`, pointerEvents: "none" }} />
                ))}
                {/* Événements positionnés */}
                {timed.map(e => {
                  const start = timeToMin(e.startTime);
                  const end = e.endTime ? Math.max(timeToMin(e.endTime), start + 20) : start + 30;
                  const top = (start / 60) * HOUR_H;
                  const height = Math.max(((end - start) / 60) * HOUR_H, 16);
                  const col = C[e.color] || C.mauve;
                  return (
                    <div key={e.id} onClick={(ev) => { ev.stopPropagation(); setEditing(e); }} style={{
                      position: "absolute", top, height, left: 2, right: 2,
                      background: col + "33", borderLeft: `3px solid ${col}`, borderRadius: 5,
                      padding: "1px 4px", overflow: "hidden", cursor: "pointer", fontSize: 10, color: C.text
                    }}>
                      <div style={{ fontWeight: 600, lineHeight: 1.2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.title}</div>
                      {height > 26 && <div style={{ color: C.textDim, fontSize: 9 }}>{eventLineLabel(e)}</div>}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </Card>

      {/* Synchronisation .ics */}
      <IcsSyncCard events={events} user={user} />

      {editing && (
        <EventForm initial={editing} onSave={save} onDelete={remove} onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

function LoginScreen() {
  const [mode, setMode] = useState("login"); // login | signup
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr(""); setBusy(true);
    try {
      if (mode === "signup") await _auth.createUserWithEmailAndPassword(email.trim(), pass);
      else await _auth.signInWithEmailAndPassword(email.trim(), pass);
      // la suite est gérée par onAuthStateChanged
    } catch (e) {
      const m = {
        "auth/invalid-email": "Adresse e-mail invalide.",
        "auth/missing-password": "Entre un mot de passe.",
        "auth/weak-password": "Mot de passe trop court (6 caractères minimum).",
        "auth/email-already-in-use": "Ce compte existe déjà — connecte-toi.",
        "auth/invalid-credential": "E-mail ou mot de passe incorrect.",
        "auth/wrong-password": "Mot de passe incorrect.",
        "auth/user-not-found": "Aucun compte avec cet e-mail.",
        "auth/network-request-failed": "Pas de connexion internet.",
        "auth/operation-not-allowed": "Connexion e-mail/mot de passe pas encore activée dans Firebase (Authentication > Sign-in method).",
        "auth/configuration-not-found": "Authentication pas encore configurée dans Firebase (Build > Authentication > Commencer).",
        "auth/api-key-not-valid": "Clé API Firebase incorrecte (à recopier dans index.html).",
        "auth/api-key-not-valid.-please-pass-a-valid-api-key.": "Clé API Firebase incorrecte (à recopier dans index.html).",
      }[e.code] || ("Erreur : " + (e.code || e.message || "inconnue"));
      setErr(m); setBusy(false);
    }
  };

  const reset = async () => {
    if (!email.trim()) { setErr("Entre ton e-mail d'abord, puis reclique."); return; }
    try { await _auth.sendPasswordResetEmail(email.trim()); setErr("📧 E-mail de réinitialisation envoyé !"); }
    catch { setErr("Impossible d'envoyer l'e-mail."); }
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <style>{GS}</style>
      <div style={{ width: "100%", maxWidth: 360 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 34, fontFamily: "Playfair Display", fontWeight: 700 }}>
            <span style={{ color: C.mauve }}>Gab</span><span style={{ color: C.textDim }}>OS</span>
          </div>
          <div style={{ color: C.textDim, fontSize: 13, marginTop: 6 }}>
            Connecte-toi pour synchroniser tes données sur tous tes appareils 🌸
          </div>
        </div>

        <Card>
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {[["login", "Connexion"], ["signup", "Créer un compte"]].map(([k, l]) => (
              <button key={k} onClick={() => { setMode(k); setErr(""); }} style={{
                flex: 1, padding: "8px", borderRadius: 10, fontSize: 13, fontWeight: 600,
                background: mode === k ? C.mauve + "33" : "transparent",
                color: mode === k ? C.mauve : C.textDim,
                border: `1px solid ${mode === k ? C.mauve + "66" : C.border}`
              }}>{l}</button>
            ))}
          </div>

          <input type="email" inputMode="email" autoComplete="email" placeholder="Adresse e-mail"
            value={email} onChange={e => setEmail(e.target.value)}
            style={{ width: "100%", marginBottom: 10 }} />
          <input type="password" autoComplete={mode === "signup" ? "new-password" : "current-password"}
            placeholder="Mot de passe" value={pass} onChange={e => setPass(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()}
            style={{ width: "100%", marginBottom: 14 }} />

          {err && <div style={{ fontSize: 12, color: err.startsWith("📧") ? C.teal : C.red, marginBottom: 12 }}>{err}</div>}

          <Btn onClick={submit} disabled={busy} style={{ width: "100%" }}>
            {busy ? "…" : mode === "signup" ? "Créer mon compte ✨" : "Se connecter"}
          </Btn>

          {mode === "login" && (
            <div onClick={reset} style={{ textAlign: "center", marginTop: 12, fontSize: 12, color: C.textDim, cursor: "pointer" }}>
              Mot de passe oublié ?
            </div>
          )}
        </Card>

        <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: C.textFaint, lineHeight: 1.6 }}>
          Tes données restent privées et synchronisées via ton compte.<br />
          Utilise le même e-mail sur l'iPhone et l'iPad.
        </div>
      </div>
    </div>
  );
}

// ─── ÉCRAN DE CHARGEMENT ─────────────────────────────────────────
function Splash({ text }) {
  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <style>{GS}</style>
      <div className="pulse" style={{ fontSize: 30, fontFamily: "Playfair Display", fontWeight: 700 }}>
        <span style={{ color: C.mauve }}>Gab</span><span style={{ color: C.textDim }}>OS</span>
      </div>
      <div style={{ color: C.textDim, fontSize: 13 }}>{text}</div>
    </div>
  );
}

// ─── FENÊTRE DE CONFLIT (1ʳᵉ connexion avec données des 2 côtés) ──
function ConflictModal({ onKeepDevice, onKeepCloud }) {
  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <style>{GS}</style>
      <Card style={{ maxWidth: 380 }}>
        <SectionTitle color={C.gold}>⚠️ Données des deux côtés</SectionTitle>
        <p style={{ fontSize: 13, color: C.textDim, lineHeight: 1.6, marginBottom: 16 }}>
          Cet appareil <strong style={{ color: C.text }}>et</strong> ton compte contiennent déjà
          des données. Lesquelles veux-tu garder ? (L'autre version sera remplacée.)
        </p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Btn color={C.mauve} onClick={onKeepDevice} style={{ width: "100%" }}>
            📱 Garder les données de cet appareil
          </Btn>
          <Btn color={C.teal} outline onClick={onKeepCloud} style={{ width: "100%" }}>
            ☁️ Garder les données du compte (cloud)
          </Btn>
        </div>
        <div style={{ fontSize: 11, color: C.textFaint, marginTop: 14 }}>
          💡 En cas de doute, exporte d'abord une sauvegarde (onglet Plus) avant de choisir.
        </div>
      </Card>
    </div>
  );
}

// ─── ROOT : gère login + synchro de départ, puis lance l'app ─────
function Root() {
  const [phase, setPhase] = useState(CLOUD_ENABLED ? "loading" : "app");
  const [user, setUser] = useState(null);
  const [conflict, setConflict] = useState(null);

  useEffect(() => {
    if (!CLOUD_ENABLED) return;
    initFirebase();
    if (!_auth) { setPhase("app"); return; } // Firebase indisponible : mode local
    const unsub = _auth.onAuthStateChanged(async (u) => {
      if (!u) { setUser(null); setConflict(null); setPhase("login"); return; }
      setUser(u); setPhase("syncing");
      await initialSync();
    });
    return () => unsub && unsub();
  }, []);

  // Au retour sur l'app, récupère les changements faits sur l'autre appareil
  useEffect(() => {
    if (!CLOUD_ENABLED || phase !== "app") return;
    const onVisible = () => { if (document.visibilityState === "visible") cloudPullIfNewer(); };
    document.addEventListener("visibilitychange", onVisible);
    window.addEventListener("focus", cloudPullIfNewer);
    return () => {
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", cloudPullIfNewer);
    };
  }, [phase]);

  async function initialSync() {
    try {
      const snap = await userDoc().get();
      if (!snap.exists) { await cloudSyncNow(); setPhase("app"); return; }
      const d = snap.data();
      const remoteAt = d.updatedAt?.toMillis?.() || 0;
      const appliedAt = +localStorage.getItem("gabos_applied_at") || 0;
      if (appliedAt === 0) {
        if (localHasContent()) { setConflict({ data: d.data, remoteAt }); setPhase("conflict"); return; }
        applyRemote(d.data, remoteAt); return; // recharge
      }
      if (remoteAt > appliedAt && d.updatedBy !== getDeviceId()) { applyRemote(d.data, remoteAt); return; }
      localStorage.setItem("gabos_applied_at", String(Math.max(remoteAt, appliedAt)));
      setPhase("app");
    } catch { setPhase("app"); } // hors-ligne : on entre en local
  }

  const signOut = async () => { try { await _auth.signOut(); } catch {} };

  if (phase === "loading") return <Splash text="Connexion…" />;
  if (phase === "login") return <LoginScreen />;
  if (phase === "syncing") return <Splash text="Synchronisation de tes données…" />;
  if (phase === "conflict") return (
    <ConflictModal
      onKeepDevice={async () => { setPhase("syncing"); await cloudSyncNow(); setPhase("app"); }}
      onKeepCloud={() => applyRemote(conflict.data, conflict.remoteAt)}
    />
  );
  return <App user={user} onSignOut={signOut} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
